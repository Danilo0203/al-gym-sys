<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Gym Local</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
        background: #f4f1ea;
        color: #1f2933;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(209, 168, 85, 0.18), transparent 36%),
          linear-gradient(135deg, #f7f3ea, #ebe4d7);
      }

      main {
        width: min(760px, calc(100vw - 48px));
        padding: 40px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 24px 60px rgba(69, 54, 32, 0.16);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2.25rem;
      }

      p {
        line-height: 1.6;
      }

      code {
        font-family: Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>All Gym Local</h1>
      <p>
        Minimal Electron shell placeholder for the early Windows installer. The
        operational checkpoint for Fase 4 is still the backend service
        <code>allgym-api-local</code> responding on <code>/health</code>.
      </p>
      <p>
        This shell intentionally contains no core business logic. Electron
        version: <strong id="electron-version">unknown</strong>.
      </p>
    </main>
  </body>
</html>
