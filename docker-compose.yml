services:
  web:
    build:
      context: ./all-gym-vf
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
        NEXT_PUBLIC_ENABLE_OAUTH_LOGIN: ${NEXT_PUBLIC_ENABLE_OAUTH_LOGIN:-false}
        NEXT_PUBLIC_ENABLE_PASSWORD_RECOVERY: ${NEXT_PUBLIC_ENABLE_PASSWORD_RECOVERY:-false}
    env_file:
      - ./deploy/env/web.env
    depends_on:
      sync:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - gym-local

  sync:
    build:
      context: ./gym-sync-server
      dockerfile: Dockerfile
    env_file:
      - ./deploy/env/sync.env
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - gym-local

  cloudflared:
    image: cloudflare/cloudflared:latest
    command:
      - tunnel
      - --no-autoupdate
      - --metrics
      - 0.0.0.0:2000
      - --url
      - http://web:3000
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gym-local

networks:
  gym-local:
    driver: bridge
